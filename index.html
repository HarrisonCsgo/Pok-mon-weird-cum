<script>
/* =========================
   ELEMENTS
========================= */
const game = document.getElementById("game");
const player = document.getElementById("player");
const battleScreen = document.getElementById("battleScreen");
const textbox = document.getElementById("textbox");
const enemyHpBar = document.getElementById("enemyHp");
const hpText = document.getElementById("hpText");
const levelText = document.getElementById("levelText");
const xpText = document.getElementById("xpText");
const goldText = document.getElementById("goldText");
const enemySprite = document.getElementById("enemySprite");
const enemyName = document.getElementById("enemyName");

/* =========================
   MAP SETTINGS
========================= */
const tileSize = 32;
const mapWidth = 25;
const mapHeight = 18;
let currentMapIndex = 0;
let map = [];

/* =========================
   PLAYER STATS
========================= */
let playerX = 12;
let playerY = 9;
let playerHp = 100;
let level = 1;
let xp = 0;
let gold = 0;

/* =========================
   ENEMIES
========================= */
const enemies = [
  { name:"SLIME", emoji:"👾", hp:100 },
  { name:"GHOST", emoji:"👻", hp:120 },
  { name:"DEMON", emoji:"😈", hp:150 },
  { name:"DRAGON", emoji:"🐉", hp:180 }
];

/* =========================
   MULTIPLE MAPS
========================= */
const maps = [
  { // Map 0 - Forest
    grassDensity: 0.8,
    treeDensity: 0.15,
    waterDensity: 0.05
  },
  { // Map 1 - Desert
    grassDensity: 0.5,
    treeDensity: 0.02,
    waterDensity: 0.01
  },
  { // Map 2 - Swamp
    grassDensity: 0.6,
    treeDensity: 0.05,
    waterDensity: 0.15
  }
];

function createMap(mapIndex){
  // Clear old map tiles
  document.querySelectorAll(".tile").forEach(t => t.remove());
  map = [];

  const m = maps[mapIndex];

  for(let y=0;y<mapHeight;y++){
    for(let x=0;x<mapWidth;x++){
      const tile = document.createElement("div");
      tile.classList.add("tile");

      let type = "grass";

      // Border trees
      if(x===0 || y===0 || x===mapWidth-1 || y===mapHeight-1){
        type = "tree";
      } else {
        const r = Math.random();
        if(r < m.waterDensity) type = "water";
        else if(r < m.waterDensity + m.treeDensity) type = "tree";
      }

      // Path in middle
      if(y === 8 || y === 9){
        type = "path";
      }

      tile.classList.add(type);
      tile.style.left = x*tileSize + "px";
      tile.style.top = y*tileSize + "px";

      game.appendChild(tile);
      map.push({x, y, type});
    }
  }
}

createMap(currentMapIndex);

/* =========================
   PLAYER
========================= */
function updatePlayer(){
  player.style.left = playerX*tileSize + 2 + "px";
  player.style.top = playerY*tileSize + 2 + "px";
}

function updateStats(){
  hpText.innerText = playerHp;
  levelText.innerText = level;
  xpText.innerText = xp;
  goldText.innerText = gold;
}

updatePlayer();
updateStats();

/* =========================
   MOVEMENT
========================= */
document.addEventListener("keydown", e => {
  if(inBattle) return;
  if(e.key==="ArrowRight") move("right");
  if(e.key==="ArrowLeft") move("left");
  if(e.key==="ArrowUp") move("up");
  if(e.key==="ArrowDown") move("down");
});

function move(dir){
  if(inBattle) return;

  let newX = playerX;
  let newY = playerY;

  if(dir==="right") newX++;
  if(dir==="left") newX--;
  if(dir==="up") newY--;
  if(dir==="down") newY++;

  // Map edge wrap
  if(newX < 0){ newX = mapWidth-2; currentMapIndex = (currentMapIndex+maps.length-1)%maps.length; createMap(currentMapIndex); }
  if(newX >= mapWidth){ newX = 1; currentMapIndex = (currentMapIndex+1)%maps.length; createMap(currentMapIndex); }
  if(newY < 0){ newY = mapHeight-2; currentMapIndex = (currentMapIndex+maps.length-1)%maps.length; createMap(currentMapIndex); }
  if(newY >= mapHeight){ newY = 1; currentMapIndex = (currentMapIndex+1)%maps.length; createMap(currentMapIndex); }

  const tile = map.find(t => t.x===newX && t.y===newY);
  if(!tile) return;
  if(tile.type==="tree" || tile.type==="water") return;

  playerX = newX;
  playerY = newY;
  updatePlayer();

  // Smarter enemy spawn
  if(tile.type==="grass" && Math.random() < 0.07){ // Reduced from 0.12
    startBattle();
  }
}

/* =========================
   BATTLE
========================= */
let inBattle = false;
let enemyHp;
let currentEnemy;

function startBattle(){
  inBattle = true;
  currentEnemy = enemies[Math.floor(Math.random()*enemies.length)];
  enemyHp = currentEnemy.hp;

  enemyName.innerText = "WILD " + currentEnemy.name;
  enemySprite.innerText = currentEnemy.emoji;
  enemyHpBar.style.width = "100%";
  textbox.innerText = "A wild " + currentEnemy.name + " appeared!";
  battleScreen.style.display = "flex";
}

/* =========================
   ATTACK FUNCTIONS
========================= */
function attack(){
  const damage = Math.floor(Math.random()*20)+10;
  const crit = Math.random()<0.15;
  let finalDamage = crit ? damage*2 : damage;

  enemyHp -= finalDamage;
  if(enemyHp<0) enemyHp=0;
  enemyHpBar.style.width = enemyHp + "%";

  battleScreen.classList.add("shake");
  setTimeout(()=>battleScreen.classList.remove("shake"),200);

  textbox.innerText = crit ? `CRITICAL HIT! ${finalDamage} damage!` : `You dealt ${finalDamage} damage!`;
  if(enemyHp<=0){ victory(); return; }

  setTimeout(enemyAttack,700);
}

function specialAttack(){
  const damage = Math.floor(Math.random()*35)+25;
  enemyHp -= damage;
  if(enemyHp<0) enemyHp=0;
  enemyHpBar.style.width = enemyHp + "%";

  textbox.innerText = `SPECIAL ATTACK! ${damage} damage!`;
  battleScreen.classList.add("shake");
  setTimeout(()=>battleScreen.classList.remove("shake"),200);

  if(enemyHp<=0){ victory(); return; }

  setTimeout(enemyAttack,700);
}

function enemyAttack(){
  const damage = Math.floor(Math.random()*12)+4;
  playerHp -= damage;
  if(playerHp<0) playerHp=0;
  updateStats();
  textbox.innerText = `${currentEnemy.name} hit you for ${damage}!`;
  if(playerHp<=0){
    textbox.innerText = "You fainted! Refresh to retry.";
  }
}

function heal(){
  playerHp += 20;
  if(playerHp>100) playerHp=100;
  updateStats();
  textbox.innerText = "You healed!";
  setTimeout(enemyAttack,700);
}

function runAway(){
  textbox.innerText = "You escaped!";
  setTimeout(()=>{
    battleScreen.style.display="none";
    inBattle=false;
  },800);
}

function victory(){
  const gainedXp = Math.floor(Math.random()*25)+15;
  const gainedGold = Math.floor(Math.random()*20)+5;
  xp += gainedXp; gold += gainedGold;

  if(xp >= level*50){ xp=0; level++; playerHp=100; textbox.innerText="LEVEL UP!"; }
  else textbox.innerText = `${currentEnemy.name} defeated! +${gainedXp} XP +${gained
